<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 560" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff;">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="255" y="12" width="170" height="36" rx="18" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="34" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Developer</text>

  <line x1="340" y1="48" x2="340" y2="76" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="356" y="66" font-size="12" fill="#888">Natural language</text>

  <rect x="70" y="76" width="540" height="150" rx="16" fill="none" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="6 4"/>
  <rect x="70" y="76" width="540" height="150" rx="16" fill="#EEEDFE" opacity="0.4"/>
  <text x="340" y="100" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">AI host (any MCP-compatible client)</text>

  <rect x="100" y="115" width="230" height="50" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="215" y="133" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">LLM</text>
  <text x="215" y="151" text-anchor="middle" font-size="12" fill="#534AB7">Decides which tool to call</text>

  <rect x="370" y="115" width="210" height="50" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="475" y="133" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Supported hosts</text>
  <text x="475" y="151" text-anchor="middle" font-size="12" fill="#534AB7">OpenWebUI, Claude, Cursor</text>

  <text x="215" y="195" text-anchor="middle" font-size="12" fill="#534AB7">Outputs structured tool call (JSON)</text>

  <line x1="340" y1="226" x2="340" y2="262" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="356" y="248" font-size="12" fill="#888">MCP protocol (stdio)</text>

  <rect x="70" y="262" width="540" height="160" rx="16" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="286" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">MCP server (server.py)</text>
  <text x="340" y="304" text-anchor="middle" font-size="12" fill="#0F6E56">Translates tool calls to GitHub API requests</text>

  <rect x="88"  y="325" width="96" height="40" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="136" y="349" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">list_repos</text>

  <rect x="198" y="325" width="96" height="40" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="246" y="349" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">get_PRs</text>

  <rect x="308" y="325" width="96" height="40" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="356" y="349" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">actions</text>

  <rect x="418" y="325" width="96" height="40" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="466" y="349" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">security</text>

  <rect x="528" y="325" width="72" height="40" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="564" y="349" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">stats</text>

  <text x="340" y="398" text-anchor="middle" font-size="12" fill="#0F6E56">Read-only, fine-grained token permissions</text>

  <line x1="340" y1="422" x2="340" y2="458" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="356" y="444" font-size="12" fill="#888">REST API + auth token</text>

  <rect x="215" y="458" width="250" height="50" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="340" y="476" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">GitHub API</text>
  <text x="340" y="494" text-anchor="middle" font-size="12" fill="#993C1D">Repos, actions, PRs, alerts</text>

  <path d="M465 483 L580 483 L580 140 L560 140" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#a)" stroke-dasharray="6 3"/>
  <text x="590" y="316" font-size="12" fill="#0F6E56">Response</text>

  <rect x="100" y="530" width="130" height="24" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="165" y="546" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">Host-agnostic</text>

  <rect x="250" y="530" width="140" height="24" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="320" y="546" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">Read-only by design</text>

  <rect x="410" y="530" width="150" height="24" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="485" y="546" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">Extensible to any API</text>
</svg>
